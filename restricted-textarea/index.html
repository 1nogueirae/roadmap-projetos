<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restricted Textarea</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1 class="mt-5">Restricted Textarea</h1>
        <p class="lead">This textarea has a limit of 250 characters. Don't you believe me? Just try typing more than 250
            characters!</p>

        <div class="textarea-wrapper">
            <textarea class="form-control" id="textArea" maxlength="250" placeholder="Type here...">
        </textarea>
            <span id="charCount" class="char-count"></span>
        </div>



    </div>

    <script src="script.js"></script>

</body>

</html>
